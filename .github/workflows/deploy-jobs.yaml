name: Reusable Docker Build & Helm Chart Update

on:
  workflow_call:
    inputs:
      dockerhub-username:
        required: true
        type: string
        description: "DockerHub username for image tagging"
      service-name:
        required: true
        type: string
        description: "The name of the service (e.g. expenses, mailer) used for image names"
      helm-repo:
        required: true
        type: string
        description: "The repository containing the helm charts to update"

    secrets:
      DOCKERHUB_TOKEN:
        required: true
      PERSONAL_ACCESS_TOKEN:
        required: true

jobs:
  containerize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435

      - name: Authenticate to Docker Hub
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef
        with:
          username: ${{ inputs.dockerhub-username }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image (local only)
        run: |
          docker build -t "${{ inputs.dockerhub-username }}/${{ inputs.service-name }}:${{ github.run_id }}" .

      - name: Scan image in a private registry
        id: trivy-scan
        uses: aquasecurity/trivy-action@76071ef0d7ec797419534a183b498b4d6366cf37
        with:
          image-ref: ${{ inputs.dockerhub-username }}/${{ inputs.service-name }}:${{ github.run_id }} 
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          scan-type: image
          scanners: 'vuln,secret'
          vuln-type: 'os,library'
          severity: 'CRITICAL'

      - name: Push Docker images
        if: steps.trivy-scan.outcome == 'success'
        run: docker push "${{ inputs.dockerhub-username }}/${{ inputs.service-name }}:${{ github.run_id }}"

  update-helm-chart:
    runs-on: ubuntu-latest
    needs: containerize
    steps:
      - name: Checkout application code
        uses: actions/checkout@v4

      - name: Checkout Helm charts repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.helm-repo }}
          ref: main
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          path: helm-repo

      - name: Update Helm Chart appVersion
        run: |
          # Update the appVersion in Chart.yaml with the full Docker image tag
          chart_file="helm-repo/Chart.yaml"
          sed -i "s|appVersion: .*|appVersion: \"${{ inputs.dockerhub-username }}/${{ inputs.service-name }}:${{ github.run_id }}\"|g" "$chart_file"

      - name: Commit and push changes to Helm repo
        working-directory: helm-repo
        run: |
          git config --local user.name "GitHub Actions Bot"
          git config --local user.email "actions@github.com"
          git add Chart.yaml

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "[CI] Update ${{ inputs.service-name }} appVersion to ${{ github.run_id }} [skip ci]"
            git push origin main
          fi